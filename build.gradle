plugins {
    id 'java'
    id "org.openjfx.javafxplugin" version "0.0.11"
    id "io.codearte.nexus-staging" version "0.30.0" apply false
}

sourceSets {
    main {
        output.resourcesDir = java.classesDirectory
        resources {
            exclude '**/*.scss'
        }
    }
}

allprojects {
    group = 'com.unclezs'
    version = property("app.version")
    description = "openjfx launcher"
    apply from: "${rootDir}/gradle/publications.gradle"

    repositories {
        mavenLocal()
        mavenCentral()
    }
}

def compileScss = {
    def scssDir = file("${sourceSets.main.resources.srcDirs[0]}/css")
    fileTree(scssDir).each { file ->
        if (file.isDirectory()) {
            return
        }
        if (file.name.endsWith("scss") && !file.name.startsWith("_")) {
            println "compile scss to css: $file.name"
            exec {
                executable("sass")
                args("--no-source-map", "--no-charset", file.absolutePath, file.absolutePath.replace("scss", "css"))
            }
        } else if (file.name.endsWith(".map")) {
            file.delete()
        }
    }
}

tasks.withType(JavaCompile) {
    doFirst {
        compileScss()
    }
    options.encoding = "UTF-8"
    options.fork = true
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
    options.compilerArgs += ['-Xdoclint:none', '-Xlint:none', '-nowarn']
}

dependencies {
    annotationProcessor 'org.projectlombok:lombok:1.18.24'
    compileOnly 'org.projectlombok:lombok:1.18.24'
    implementation 'com.google.code.gson:gson:2.9.0'
    // test
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.2'
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine"
}

test {
    useJUnitPlatform()
    include(["**/*Tests.class", "**/*Test.class"])
}

javafx {
    version = "17.0.2"
    modules = ["javafx.base", "javafx.controls", "javafx.fxml"]
    configuration = "compileOnly"
}

jar {
    exclude "**/scss/**"
}
